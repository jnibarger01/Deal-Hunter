# Optional deployment manifest (non-primary path).
# Primary production contract is Docker host + Supabase Postgres.

services:
  # Backend API (uses external Supabase Postgres via DATABASE_URL)
  - type: web
    name: deal-hunter-api
    runtime: docker
    dockerfilePath: ./docker/server.Dockerfile
    dockerContext: .
    region: oregon
    plan: free
    healthCheckPath: /ready
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: CORS_ORIGIN
        value: https://deal-hunter-frontend.onrender.com
      - key: AUTH_RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: AUTH_RATE_LIMIT_MAX_REQUESTS
        value: 10
      - key: TRUST_PROXY
        value: 1
      - key: LOG_LEVEL
        value: info
      # Optional integrations/secrets in Render dashboard (do not commit)
      # - key: EBAY_API_KEY
      #   sync: false
      # - key: GEMINI_API_KEY
      #   sync: false

  # Frontend (static site)
  - type: web
    name: deal-hunter-frontend
    runtime: static
    region: oregon
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://deal-hunter-api.onrender.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
