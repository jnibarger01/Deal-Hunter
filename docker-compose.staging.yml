services:
  server:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-deal-hunter}-server:${TAG:-staging}
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
      - /app/logs
    environment:
      - NODE_ENV=staging
      - PORT=5000
      - API_VERSION=${API_VERSION:-v1}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - EBAY_API_KEY=${EBAY_API_KEY}
      - EBAY_APP_ID=${EBAY_APP_ID}
      - EBAY_CLIENT_ID=${EBAY_CLIENT_ID}
      - EBAY_CLIENT_SECRET=${EBAY_CLIENT_SECRET}
      - EBAY_OAUTH_ENVIRONMENT=${EBAY_OAUTH_ENVIRONMENT:-PRODUCTION}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - OPERATOR_INGEST_TOKEN=${OPERATOR_INGEST_TOKEN}
      - OPERATOR_SECRET_KEY=${OPERATOR_SECRET_KEY}
      - MARKETPLACE_DELETE_TOKEN=${MARKETPLACE_DELETE_TOKEN}
      - CRAIGSLIST_RSS_URLS=${CRAIGSLIST_RSS_URLS:-}
      - CRAIGSLIST_MAX_PER_FEED=${CRAIGSLIST_MAX_PER_FEED:-50}
      - CRAIGSLIST_INGEST_INTERVAL_MINUTES=${CRAIGSLIST_INGEST_INTERVAL_MINUTES:-30}
      - CRAIGSLIST_SCHEDULER_ENABLED=${CRAIGSLIST_SCHEDULER_ENABLED:-false}
      - AUTH_RATE_LIMIT_WINDOW_MS=${AUTH_RATE_LIMIT_WINDOW_MS:-900000}
      - AUTH_RATE_LIMIT_MAX_REQUESTS=${AUTH_RATE_LIMIT_MAX_REQUESTS:-10}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - TRUST_PROXY=${TRUST_PROXY:-1}
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/ready" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - deal-hunter-network

  nginx:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-deal-hunter}-nginx:${TAG:-staging}
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/nginx-health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - deal-hunter-network

networks:
  deal-hunter-network:
    driver: bridge
