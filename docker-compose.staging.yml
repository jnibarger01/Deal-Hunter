services:
  server:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:?IMAGE_PREFIX must be set}-server:${TAG:-staging}
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    environment:
      - NODE_ENV=staging
      - PORT=5000
      - API_VERSION=v1
      - DATABASE_URL=${DATABASE_URL}
      - EBAY_API_KEY=${EBAY_API_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - TRUST_PROXY=${TRUST_PROXY:-1}
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/ready" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - deal-hunter-network

  nginx:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:?IMAGE_PREFIX must be set}-nginx:${TAG:-staging}
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - deal-hunter-network

networks:
  deal-hunter-network:
    driver: bridge
