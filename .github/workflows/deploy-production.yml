name: Deploy to Production

on:
  push:
    branches: [main]
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/deal-hunter
  CI_POSTGRES_PASSWORD: test

jobs:
  validate:
    name: Validate before production deploy
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: ${{ env.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Generate Prisma client
        working-directory: ./server
        env:
          DATABASE_URL: "postgresql://test:${{ env.CI_POSTGRES_PASSWORD }}@localhost:5432/test?schema=public"
        run: npx prisma generate

      - name: Run database migrations
        working-directory: ./server
        env:
          DATABASE_URL: "postgresql://test:${{ env.CI_POSTGRES_PASSWORD }}@localhost:5432/test?schema=public"
        run: npx prisma migrate deploy

      - name: Lint server
        run: npm run lint --workspace server

      - name: Test server
        env:
          DATABASE_URL: "postgresql://test:${{ env.CI_POSTGRES_PASSWORD }}@localhost:5432/test?schema=public"
          JWT_SECRET: "test-jwt-secret-for-ci-32-characters-long"
        run: npm test --workspace server

      - name: Test frontend
        run: npm test --workspace frontend

      - name: Build all workspaces
        run: npm run build

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version tag
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=latest" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/server.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-server:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push nginx image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/nginx.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-nginx:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-nginx:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        if: ${{ vars.PRODUCTION_HOST != '' }}
        with:
          host: ${{ vars.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd ${{ vars.DEPLOY_PATH }}
            if [ -f .env ]; then set -a && . ./.env && set +a; fi
            for name in DATABASE_URL JWT_SECRET SMTP_HOST SMTP_PORT SMTP_USER SMTP_PASS SMTP_FROM OPERATOR_INGEST_TOKEN OPERATOR_SECRET_KEY MARKETPLACE_DELETE_TOKEN; do
              if [ -z "$(printenv "$name")" ]; then
                echo "Missing required production env var: $name" >&2
                exit 1
              fi
            done
            export REGISTRY=ghcr.io
            export IMAGE_PREFIX=${{ github.repository_owner }}/deal-hunter
            export TAG=${{ steps.version.outputs.VERSION }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml run --rm server npx prisma migrate deploy
            docker compose -f docker-compose.prod.yml up -d
            PRODUCTION_BASE_URL="${{ vars.PRODUCTION_BASE_URL }}"
            PRODUCTION_BASE_URL="${PRODUCTION_BASE_URL%/}"
            if [ -n "$PRODUCTION_BASE_URL" ]; then
              ./scripts/verify-production.sh \
                --health-url "$PRODUCTION_BASE_URL/health" \
                --ready-url "$PRODUCTION_BASE_URL/ready"
            fi
            docker system prune -f
