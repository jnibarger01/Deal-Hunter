services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dealhunter
      POSTGRES_USER: dealhunter
      POSTGRES_PASSWORD: dealhunter_dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dealhunter"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deal-hunter-network

  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: development
      PORT: 5000
      API_VERSION: v1
      DATABASE_URL: postgresql://dealhunter:dealhunter_dev_password@db:5432/dealhunter?schema=public
      EBAY_APP_ID: ${EBAY_APP_ID:-}
      EBAY_CLIENT_ID: ${EBAY_CLIENT_ID:-}
      EBAY_CLIENT_SECRET: ${EBAY_CLIENT_SECRET:-}
      EBAY_OAUTH_ENVIRONMENT: ${EBAY_OAUTH_ENVIRONMENT:-PRODUCTION}
      FRONTEND_URL: http://localhost:8081
      CORS_ORIGIN: http://localhost:5173,http://localhost:8081
      TRUST_PROXY: 1
      LOG_LEVEL: info
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    ports:
      - "5002:5000"
    networks:
      - deal-hunter-network

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "5173:5173"
    networks:
      - deal-hunter-network

  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "8081:80"
    networks:
      - deal-hunter-network

networks:
  deal-hunter-network:
    driver: bridge

volumes:
  postgres_data:
